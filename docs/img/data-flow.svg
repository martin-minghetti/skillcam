<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" fill="none">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .label { fill: #e2e8f0; font-size: 13px; font-weight: 600; }
    .sublabel { fill: #94a3b8; font-size: 10px; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- CLI -->
  <rect x="20" y="88" width="140" height="64" class="box" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="90" y="116" text-anchor="middle" class="label">CLI</text>
  <text x="90" y="133" text-anchor="middle" class="sublabel">Commander entry</text>

  <line x1="160" y1="120" x2="200" y2="120" class="arrow"/>

  <!-- Discovery -->
  <rect x="200" y="88" width="140" height="64" class="box" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="270" y="116" text-anchor="middle" class="label">Discovery</text>
  <text x="270" y="133" text-anchor="middle" class="sublabel">Finds session logs</text>

  <line x1="340" y1="120" x2="380" y2="120" class="arrow"/>

  <!-- Parsers -->
  <rect x="380" y="88" width="140" height="64" class="box" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="116" text-anchor="middle" class="label">Parsers</text>
  <text x="450" y="133" text-anchor="middle" class="sublabel">Claude Code · Codex</text>

  <line x1="520" y1="120" x2="560" y2="120" class="arrow"/>

  <!-- Distiller -->
  <rect x="560" y="88" width="140" height="64" class="box" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="630" y="116" text-anchor="middle" class="label">Distiller</text>
  <text x="630" y="133" text-anchor="middle" class="sublabel">LLM or template mode</text>

  <!-- Distiller branches to two outputs -->
  <line x1="700" y1="108" x2="780" y2="48" class="arrow"/>
  <line x1="700" y1="132" x2="780" y2="192" class="arrow"/>

  <!-- SKILL.md -->
  <rect x="780" y="20" width="160" height="56" class="box" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <text x="860" y="44" text-anchor="middle" class="label" fill="#34d399">SKILL.md</text>
  <text x="860" y="61" text-anchor="middle" class="sublabel" fill="#10b981">Reusable output</text>

  <!-- Events log -->
  <rect x="780" y="164" width="160" height="56" class="box" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="860" y="188" text-anchor="middle" class="label">Events log</text>
  <text x="860" y="205" text-anchor="middle" class="sublabel">Run metadata · tokens</text>
</svg>
