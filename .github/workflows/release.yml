# Publish to npm via trusted publishing (OIDC) with provenance, then create
# the matching GitHub Release with auto-generated notes.
#
# SETUP (one-time, Martin must do this manually on npmjs.com):
#   1. Go to https://www.npmjs.com/package/skillcam/access
#   2. Under "Publishing access" > "Trusted publisher", add a GitHub Actions publisher with:
#        - Organization/User: martin-minghetti
#        - Repository:        skillcam
#        - Workflow filename: release.yml
#        - Environment name:  (leave empty)
#   3. No NPM_TOKEN secret is needed after that — OIDC handles auth.
#
# Requires: npm CLI >= 11.5.1 on the runner for OIDC trusted publishing.
# Node 20 ships npm 10.8.2, so we upgrade npm explicitly before publish.
# The GitHub Release step uses the built-in GITHUB_TOKEN (no extra secret),
# which is why `contents: write` is required at the workflow level.
# Trigger:  push a tag matching v*.*.* (e.g. `git tag v0.2.4 && git push --tags`).

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            --latest
