# Publish to npm via trusted publishing (OIDC) with provenance.
#
# SETUP (one-time, Martin must do this manually on npmjs.com):
#   1. Go to https://www.npmjs.com/package/skillcam/access
#   2. Under "Publishing access" > "Trusted publisher", add a GitHub Actions publisher with:
#        - Organization/User: martin-minghetti
#        - Repository:        skillcam
#        - Workflow filename: release.yml
#        - Environment name:  (leave empty)
#   3. No NPM_TOKEN secret is needed after that — OIDC handles auth.
#
# Requires: npm CLI >= 11.5.1 on the runner (satisfied by setup-node with npm ci).
# Trigger:  push a tag matching v*.*.* (e.g. `git tag v0.2.0 && git push --tags`).

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
