version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    # Majors are intentionally left ungrouped so each one gets its own PR for review.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    # Pin actions by commit SHA for supply chain hardening.
    # Dependabot will keep the SHA pins up-to-date automatically.
    groups:
      github-actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
